<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#714B67"/>
      <stop offset="100%" stop-color="#A57F9E"/>
    </linearGradient>
  </defs>

  <circle cx="110" cy="110" r="92" fill="none" stroke="url(#grad1)" stroke-width="5" stroke-dasharray="18 12" opacity="0.85">
    <animateTransform attributeName="transform" type="rotate" from="0 110 110" to="360 110 110" dur="9s" repeatCount="indefinite"/>
  </circle>

  <circle cx="110" cy="110" r="70" fill="none" stroke="#E4DCE1" stroke-width="2" stroke-dasharray="4 6" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="360 110 110" to="0 110 110" dur="14s" repeatCount="indefinite"/>
  </circle>

  <circle cx="110" cy="110" r="62" fill="#FFFFFF" stroke="#714B67" stroke-width="3">
    <animate attributeName="r" values="62;66;62" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="3;4;3" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <text x="110" y="124" font-family="Poppins, Verdana, sans-serif" font-size="40" font-weight="700" text-anchor="middle" fill="#714B67">
    AF
    <animate attributeName="fill" values="#714B67;#A57F9E;#714B67" dur="3s" repeatCount="indefinite"/>
  </text>

  <circle cx="110" cy="20" r="4" fill="#714B67">
    <animateTransform attributeName="transform" type="rotate" from="0 110 110" to="360 110 110" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
